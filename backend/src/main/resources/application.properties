# ==========================================
# CONFIGURACIÓN DEL SERVIDOR
# ==========================================
server.port=8080

# ==========================================
# BASE DE DATOS SQL SERVER (la MISMA del desktop)
# Coincide con desktop/src/main/resources/config.properties
# ==========================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=centro_medico;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Rodrigo3%
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
# No fallar al arrancar si la BD aún no existe: el seed runner la crea
spring.datasource.hikari.initialization-fail-timeout=-1

# ==========================================
# JPA / HIBERNATE
# El esquema lo gestiona init_db.sql (idéntico al desktop), NO Hibernate.
# ==========================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
# Evita que Hibernate abra una conexión al arrancar (la BD puede no existir todavía)
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ==========================================
# JWT
# ==========================================
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration=86400000

# ==========================================
# CORS
# ==========================================
app.cors.allowed-origins=http://localhost:3000

# ==========================================
# SWAGGER / OPENAPI
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ==========================================
# LOGS
# ==========================================
logging.level.edu.universidad=DEBUG
logging.level.org.springframework.security=WARN
