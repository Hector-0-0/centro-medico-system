server {
    listen 80;
    server_name _;

    root   /usr/share/nginx/html;
    index  index.html;

    # API: nginx reenvía /api al backend (servicio "backend" de la red de Docker
    # Compose). El navegador solo habla con este origen → no hay problemas de CORS.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # El PDF de la receta puede tardar un poco en generarse.
        proxy_read_timeout 60s;
    }

    # SPA: cualquier ruta desconocida cae en index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
