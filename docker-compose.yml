services:
  # ─── Backend Spring Boot (API REST) ─────────────────────────────
  # La BD es el contenedor SQL Server que ya tienes corriendo (la MISMA
  # del desktop). No la administra este compose: el backend se conecta a
  # ella a través del host (1433 publicado) usando host.docker.internal.
  backend:
    build: ./backend
    container_name: centromedico-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://host.docker.internal:1433;databaseName=centro_medico;encrypt=true;trustServerCertificate=true"
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: Rodrigo3%
      APP_JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    # Permite resolver host.docker.internal hacia el host en Linux
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Frontend React (servido por Nginx) ─────────────────────────
  frontend:
    build: ./frontend
    container_name: centromedico-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
