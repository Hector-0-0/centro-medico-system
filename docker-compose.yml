version: '3.8'

services:
  # ─── Base de datos PostgreSQL ───────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: centromedico-db
    environment:
      POSTGRES_DB: centro_medico
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend Spring Boot ────────────────────────────────────────
  backend:
    build: ./backend
    container_name: centromedico-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/centro_medico
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
      APP_JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
